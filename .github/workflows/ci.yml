name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build + clippy
    runs-on: macos-14   # Apple Silicon; preinstalled Xcode includes metal toolchain
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      # mlx-sys (and onig_sys / alloca) compile against the macos-14 runner's
      # SDK and reference __isPlatformVersionAtLeast, which only exists when
      # the deployment target is >= 14. Without this the linker defaults to
      # 11.0 and fails with "symbol(s) not found for architecture arm64".
      MACOSX_DEPLOYMENT_TARGET: "14.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Verify metal toolchain
        run: |
          xcode-select -p
          xcrun -f metal
          xcrun metal --version || (
            echo "::warning::Metal toolchain not installed; downloading…"
            sudo xcodebuild -downloadComponent MetalToolchain
          )

      - name: Cache cargo registry / mlx-sys build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release/build/mlx-sys-*/out
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --release --all-targets

      - name: Clippy (deny warnings)
        run: cargo clippy --release --all-targets --all-features -- -D warnings

      - name: Rustfmt check
        run: cargo fmt --all -- --check

      - name: Test
        # parity test is `#[ignore]` (needs python mlx-lm + a downloaded
        # model); only the cheap in-process tests run here.
        run: cargo test --release
