name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build + clippy
    runs-on: macos-14   # Apple Silicon; preinstalled Xcode includes metal toolchain
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      # mlx-sys (and onig_sys / alloca) compile against the macos-14 runner's
      # SDK and reference __isPlatformVersionAtLeast, which only exists when
      # the deployment target is >= 14. Without this the linker defaults to
      # 11.0 and fails with "symbol(s) not found for architecture arm64".
      MACOSX_DEPLOYMENT_TARGET: "14.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Verify metal toolchain
        run: |
          xcode-select -p
          xcrun -f metal
          xcrun metal --version || (
            echo "::warning::Metal toolchain not installed; downloading…"
            sudo xcodebuild -downloadComponent MetalToolchain
          )

      - name: Link clang compiler-rt for __isPlatformVersionAtLeast
        # mlx-sys's C++ uses @available() checks that emit calls to
        # __isPlatformVersionAtLeast. That symbol lives in clang's
        # libclang_rt.osx.a, which rustc's `cc -nodefaultlibs` link line
        # does not pull in, so we have to add it to RUSTFLAGS explicitly.
        run: |
          CLANG_RT_DIR="$(clang -print-resource-dir)/lib/darwin"
          ls "$CLANG_RT_DIR/libclang_rt.osx.a"
          echo "RUSTFLAGS=-C link-arg=-L${CLANG_RT_DIR} -C link-arg=-lclang_rt.osx" >> "$GITHUB_ENV"

      - name: Cache cargo registry / mlx-sys build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release/build/mlx-sys-*/out
          # Deployment target is part of the cache key so a stale mlx-sys
          # build from before MACOSX_DEPLOYMENT_TARGET was set gets evicted.
          key: ${{ runner.os }}-cargo-mt${{ env.MACOSX_DEPLOYMENT_TARGET }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-mt${{ env.MACOSX_DEPLOYMENT_TARGET }}-

      - name: Build (release)
        run: cargo build --release --all-targets

      - name: Clippy (deny warnings)
        run: cargo clippy --release --all-targets --all-features -- -D warnings

      - name: Rustfmt check
        run: cargo fmt --all -- --check

      - name: Test
        # parity test is `#[ignore]` (needs python mlx-lm + a downloaded
        # model); only the cheap in-process tests run here.
        run: cargo test --release
